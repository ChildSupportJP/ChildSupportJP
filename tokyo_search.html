            url: "https://www.city.fuchu.tokyo.jp/kosodate/shussan/hitorioya-sekatushien/youikuhi.html"
        },
        {
            city: "清瀬市",
            title: "養育費確保支援事業補助金",
            outline: "養育費に関する公正証書等の作成に要した公証人手数料、戸籍抄本等取得経費や収入印紙代を補助します。",
            limit: "公正証書等作成：43,000円 / 戸籍取得等：7,600円",
            url: "https://www.city.kiyose.lg.jp/kosodatekyouiku/kosodatehojo/hitorioyakateihojo/1010160.html"
        },
        {
            city: "西東京市",
            title: "養育費確保サポート",
            outline: "養育費の継続的な履行を支援するため、公正証書作成費用や保証契約の初回保証料の一部を助成します。",
            limit: "上限：要確認",
            url: "https://www.city.nishitokyo.lg.jp/kosodate/hitorioyakatei/youikuhikakuhosienn.html"
        },
        {
            city: "東京都（町村部）",
            title: "東京都 養育費確保支援事業（町村部にお住まいの方）",
            outline: "西多摩郡（瑞穂町・日の出町・檜原村・奥多摩町）および島しょ部（大島町、八丈町など）にお住まいの方を対象に、公正証書等作成費用や初回保証料を東京都が補助します。（※特別区・市部にお住まいの方は各自治体の制度が優先されます）",
            limit: "上限：公正証書等 50,000円 / 保証料 50,000円 等（要確認）",
            url: "https://www.fukushi.metro.tokyo.lg.jp/kodomo/hitorioya_shien/youikuhikakuho"
        }
    ];

    document.addEventListener("DOMContentLoaded", () => {
        initCities();
        renderResults(db); 
    });

    function initCities() {
        const citySelect = document.getElementById('citySelect');
        const cities = [...new Set(db.map(item => item.city))].sort((a, b) => a.localeCompare(b, 'ja'));
        
        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }

    function filterResults() {
        const cityValue = document.getElementById('citySelect').value;
        const keyword = document.getElementById('keywordInput').value.toLowerCase();

        const filteredDb = db.filter(item => {
            const matchCity = cityValue === "" || item.city === cityValue;
            const searchText = `${item.city} ${item.title} ${item.outline}`.toLowerCase();
            const matchKeyword = keyword === "" || searchText.includes(keyword);

            return matchCity && matchKeyword;
        });

        renderResults(filteredDb);
    }

    function renderResults(data) {
        const container = document.getElementById('resultsContainer');
        const noResult = document.getElementById('noResult');
        const countDisplay = document.getElementById('resultCount');
        
        container.innerHTML = ''; 

        if (data.length === 0) {
            noResult.style.display = 'block';
            countDisplay.textContent = '該当する助成金は0件です';
            return;
        }

        noResult.style.display = 'none';
        countDisplay.textContent = `${data.length}件の自治体情報が見つかりました`;

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="badge">東京都</span>
                    <h3>${item.city}</h3>
                </div>
                <div class="card-title">${item.title}</div>
                <p>${item.outline}</p>
                <div class="limit-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0; margin-top:2px"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <span>${item.limit}</span>
                </div>
                <a href="${item.url}" target="_blank" class="btn-link">公式ページで詳細・申請方法を確認する ＞</a>
            `;
            container.appendChild(card);
        });
    }
</script>
