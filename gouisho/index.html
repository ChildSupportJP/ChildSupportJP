<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>養育費合意書 作成ツール</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Noto Sans JP', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ============================================================
// CONSTANTS
// ============================================================
const MONTHS = Array.from({ length: 12 }, (_, i) => i + 1);
// ★変更点1: 2001年から50年分（2001〜2050年）を選択できるように変更
const YEARS = Array.from({ length: 50 }, (_, i) => 2001 + i);
const DAYS = Array.from({ length: 31 }, (_, i) => i + 1);
const AGES = Array.from({ length: 22 }, (_, i) => i + 1);

// ============================================================
// INITIAL STATE
// ============================================================
const defaultChild = () => ({
  id: Date.now(),
  name: "",
  birthYear: "",
  birthMonth: "",
  birthDay: "",
  periodType: "A",
  periodAFromYear: "",
  periodAFromMonth: "",
  periodAToYear: "",
  periodAToMonth: "",
  periodBFromYear: "",
  periodBFromMonth: "",
  periodBAge: "",
  amount: "",
  paymentType: "A",
  paymentADay: "",
  paymentBMonth: "",
  paymentBMonths: "",
});

const initialState = {
  payerRole: "父",
  payeeRole: "母",
  children: [defaultChild()],
  bankName: "",
  branchName: "",
  accountType: "普通",
  accountNumber: "",
  accountHolder: "",
  specialClause: "",
  pastFeeHandling: "A",
  createdYear: "",
  createdMonth: "",
  createdDay: "",
};

// ============================================================
// HELPERS
// ============================================================
function formatAmount(v) {
  const n = v.replace(/[^0-9]/g, "");
  return n.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function Select({ value, onChange, options, placeholder, className = "" }) {
  return (
    <select
      value={value}
      onChange={(e) => onChange(e.target.value)}
      className={`border border-stone-300 rounded px-3 py-2 bg-white text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 text-sm ${className}`}
    >
      {placeholder && <option value="">{placeholder}</option>}
      {options.map((o) =>
        typeof o === "object" ? (
          <option key={o.value} value={o.value}>{o.label}</option>
        ) : (
          <option key={o} value={o}>{o}</option>
        )
      )}
    </select>
  );
}

function Input({ value, onChange, placeholder, className = "", type = "text" }) {
  return (
    <input
      type={type}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      className={`border border-stone-300 rounded px-3 py-2 bg-white text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 text-sm w-full ${className}`}
    />
  );
}

function Label({ children }) {
  return <span className="text-xs font-semibold text-stone-500 uppercase tracking-wider">{children}</span>;
}

function Row({ label, children, className = "" }) {
  return (
    <div className={`flex flex-col gap-1 ${className}`}>
      {label && <Label>{label}</Label>}
      <div className="flex flex-wrap gap-2 items-center">{children}</div>
    </div>
  );
}

function Card({ children, className = "" }) {
  return (
    <div className={`bg-white border border-stone-200 rounded-xl p-6 shadow-sm ${className}`}>
      {children}
    </div>
  );
}

// ============================================================
// STEP COMPONENTS
// ============================================================

function StepParties({ data, setData }) {
  const roles = ["父", "母"];
  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">当事者情報</h2>
        <p className="text-sm text-stone-500">養育費を支払う側と受け取る側を選択してください。</p>
      </div>
      <Card>
        <div className="space-y-5">
          <Row label="養育費を支払う側">
            <div className="flex gap-3">
              {roles.map((r) => (
                <button
                  key={r}
                  onClick={() => setData({ ...data, payerRole: r })}
                  className={`px-8 py-3 rounded-lg border-2 text-lg font-bold transition-all ${
                    data.payerRole === r
                      ? "border-amber-600 bg-amber-50 text-amber-800"
                      : "border-stone-200 bg-white text-stone-500 hover:border-stone-400"
                  }`}
                >
                  {r}
                </button>
              ))}
            </div>
          </Row>
          <Row label="養育費を受け取る側">
            <div className="flex gap-3">
              {roles.map((r) => (
                <button
                  key={r}
                  onClick={() => setData({ ...data, payeeRole: r })}
                  className={`px-8 py-3 rounded-lg border-2 text-lg font-bold transition-all ${
                    data.payeeRole === r
                      ? "border-amber-600 bg-amber-50 text-amber-800"
                      : "border-stone-200 bg-white text-stone-500 hover:border-stone-400"
                  }`}
                >
                  {r}
                </button>
              ))}
            </div>
          </Row>
          {data.payerRole === data.payeeRole && (
            <p className="text-red-500 text-sm">支払う側と受け取る側を異なる役割にしてください。</p>
          )}
        </div>
      </Card>
    </div>
  );
}

function ChildForm({ child, idx, onUpdate, onRemove, canRemove }) {
  const updateChild = (field, val) => onUpdate({ ...child, [field]: val });

  return (
    <Card className="relative">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-bold text-stone-700 text-lg">子ども {idx + 1}</h3>
        {canRemove && (
          <button
            onClick={onRemove}
            className="text-red-400 hover:text-red-600 text-sm border border-red-200 hover:border-red-400 px-3 py-1 rounded transition-all"
          >
            削除
          </button>
        )}
      </div>
      <div className="space-y-5">
        <Row label="氏名">
          <Input value={child.name} onChange={(v) => updateChild("name", v)} placeholder="山田 花子" className="max-w-xs" />
        </Row>
        <div>
          <Label>生年月日</Label>
          <div className="flex gap-2 mt-1 items-center flex-wrap">
            <Select value={child.birthYear} onChange={(v) => updateChild("birthYear", v)} options={YEARS} placeholder="年" className="w-24" />
            <span className="text-stone-500 text-sm">年</span>
            <Select value={child.birthMonth} onChange={(v) => updateChild("birthMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
            <span className="text-stone-500 text-sm">月</span>
            <Select value={child.birthDay} onChange={(v) => updateChild("birthDay", v)} options={DAYS} placeholder="日" className="w-20" />
            <span className="text-stone-500 text-sm">日</span>
          </div>
        </div>

        {/* 支払期間 */}
        <div className="space-y-3">
          <Label>支払期間</Label>
          <div className="space-y-3">
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="radio" name={`periodType-${child.id}`} value="A" checked={child.periodType === "A"} onChange={() => updateChild("periodType", "A")} className="mt-1 accent-amber-600" />
              <div className="space-y-2">
                <span className="text-sm text-stone-700 font-medium">期間を指定する</span>
                {child.periodType === "A" && (
                  <div className="flex gap-2 items-center flex-wrap">
                    <Select value={child.periodAFromYear} onChange={(v) => updateChild("periodAFromYear", v)} options={YEARS} placeholder="年" className="w-24" />
                    <span className="text-stone-500 text-sm">年</span>
                    <Select value={child.periodAFromMonth} onChange={(v) => updateChild("periodAFromMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
                    <span className="text-stone-500 text-sm">月から</span>
                    <Select value={child.periodAToYear} onChange={(v) => updateChild("periodAToYear", v)} options={YEARS} placeholder="年" className="w-24" />
                    <span className="text-stone-500 text-sm">年</span>
                    <Select value={child.periodAToMonth} onChange={(v) => updateChild("periodAToMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
                    <span className="text-stone-500 text-sm">月まで</span>
                  </div>
                )}
              </div>
            </label>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="radio" name={`periodType-${child.id}`} value="B" checked={child.periodType === "B"} onChange={() => updateChild("periodType", "B")} className="mt-1 accent-amber-600" />
              <div className="space-y-2">
                <span className="text-sm text-stone-700 font-medium">子が一定年齢に達した後の3月まで</span>
                {child.periodType === "B" && (
                  <div className="flex gap-2 items-center flex-wrap">
                    <Select value={child.periodBFromYear} onChange={(v) => updateChild("periodBFromYear", v)} options={YEARS} placeholder="年" className="w-24" />
                    <span className="text-stone-500 text-sm">年</span>
                    <Select value={child.periodBFromMonth} onChange={(v) => updateChild("periodBFromMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
                    <span className="text-stone-500 text-sm">月から子が</span>
                    <Select value={child.periodBAge} onChange={(v) => updateChild("periodBAge", v)} options={AGES} placeholder="歳" className="w-20" />
                    <span className="text-stone-500 text-sm">歳に達した後の最初の3月まで</span>
                  </div>
                )}
              </div>
            </label>
          </div>
        </div>

        {/* 金額 */}
        <Row label="月額養育費">
          <div className="flex items-center gap-2">
            <span className="text-stone-500 text-sm">月額</span>
            <div className="relative">
              <Input
                value={child.amount}
                onChange={(v) => updateChild("amount", formatAmount(v))}
                placeholder="50,000"
                className="max-w-[160px]"
              />
            </div>
            <span className="text-stone-500 text-sm">円</span>
          </div>
        </Row>

        {/* 支払時期 */}
        <div className="space-y-3">
          <Label>支払時期</Label>
          <div className="space-y-3">
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="radio" name={`payType-${child.id}`} value="A" checked={child.paymentType === "A"} onChange={() => updateChild("paymentType", "A")} className="mt-1 accent-amber-600" />
              <div className="space-y-2">
                <span className="text-sm text-stone-700 font-medium">毎月払い</span>
                {child.paymentType === "A" && (
                  <div className="flex gap-2 items-center">
                    <span className="text-stone-500 text-sm">毎月</span>
                    {/* ★変更点2: 選択肢に「末」を追加 */}
                    <Select value={child.paymentADay} onChange={(v) => updateChild("paymentADay", v)} options={[...DAYS, "末"]} placeholder="日/末" className="w-20" />
                    <span className="text-stone-500 text-sm">日（1か月分）</span>
                  </div>
                )}
              </div>
            </label>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="radio" name={`payType-${child.id}`} value="B" checked={child.paymentType === "B"} onChange={() => updateChild("paymentType", "B")} className="mt-1 accent-amber-600" />
              <div className="space-y-2">
                <span className="text-sm text-stone-700 font-medium">まとめ払い（年払い等）</span>
                {child.paymentType === "B" && (
                  <div className="flex gap-2 items-center flex-wrap">
                    <span className="text-stone-500 text-sm">毎年</span>
                    <Select value={child.paymentBMonth} onChange={(v) => updateChild("paymentBMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
                    <span className="text-stone-500 text-sm">月に</span>
                    <Select value={child.paymentBMonths} onChange={(v) => updateChild("paymentBMonths", v)} options={Array.from({ length: 12 }, (_, i) => i + 1)} placeholder="か月分" className="w-24" />
                    <span className="text-stone-500 text-sm">か月分ずつ</span>
                  </div>
                )}
              </div>
            </label>
          </div>
        </div>
      </div>
    </Card>
  );
}

function StepChildren({ data, setData }) {
  const addChild = () => {
    if (data.children.length >= 4) return;
    setData({ ...data, children: [...data.children, defaultChild()] });
  };
  const removeChild = (idx) => {
    const c = [...data.children];
    c.splice(idx, 1);
    setData({ ...data, children: c });
  };
  const updateChild = (idx, child) => {
    const c = [...data.children];
    c[idx] = child;
    setData({ ...data, children: c });
  };

  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">子どもの情報と支払条件</h2>
        <p className="text-sm text-stone-500">最大4人まで登録できます。</p>
      </div>
      {data.children.map((child, idx) => (
        <ChildForm
          key={child.id}
          child={child}
          idx={idx}
          onUpdate={(c) => updateChild(idx, c)}
          onRemove={() => removeChild(idx)}
          canRemove={data.children.length > 1}
        />
      ))}
      {data.children.length < 4 && (
        <button
          onClick={addChild}
          className="w-full border-2 border-dashed border-stone-300 hover:border-amber-500 text-stone-400 hover:text-amber-600 py-4 rounded-xl text-sm font-medium transition-all"
        >
          ＋ 子どもを追加する
        </button>
      )}
    </div>
  );
}

function StepBank({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">振込先情報</h2>
        <p className="text-sm text-stone-500">養育費の振込先口座を入力してください。</p>
      </div>
      <Card className="space-y-5">
        <div className="grid grid-cols-2 gap-4">
          <div className="flex flex-col gap-1">
            <Label>金融機関名</Label>
            <Input value={data.bankName} onChange={(v) => set("bankName", v)} placeholder="○○銀行" />
          </div>
          <div className="flex flex-col gap-1">
            <Label>支店名</Label>
            <Input value={data.branchName} onChange={(v) => set("branchName", v)} placeholder="○○支店" />
          </div>
        </div>
        <Row label="口座の種類">
          {["普通", "当座"].map((t) => (
            <button
              key={t}
              onClick={() => set("accountType", t)}
              className={`px-6 py-2 rounded-lg border-2 text-sm font-bold transition-all ${
                data.accountType === t
                  ? "border-amber-600 bg-amber-50 text-amber-800"
                  : "border-stone-200 text-stone-500 hover:border-stone-400"
              }`}
            >
              {t}
            </button>
          ))}
        </Row>
        <div className="flex flex-col gap-1">
          <Label>口座番号</Label>
          <Input value={data.accountNumber} onChange={(v) => set("accountNumber", v.replace(/[^0-9]/g, ""))} placeholder="1234567" className="max-w-xs" />
        </div>
        <div className="flex flex-col gap-1">
          <Label>口座名義（カタカナ）</Label>
          <Input value={data.accountHolder} onChange={(v) => set("accountHolder", v)} placeholder="ヤマダ ハナコ" className="max-w-xs" />
        </div>
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-800">
          ※ 振込手数料は、支払う側が負担することとします。（PDF に自動記載されます）
        </div>
      </Card>
    </div>
  );
}

function StepSpecial({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">特約・清算条項</h2>
        <p className="text-sm text-stone-500">特約事項と過去の養育費の扱いを設定してください。</p>
      </div>
      <Card className="space-y-5">
        <div className="flex flex-col gap-1">
          <Label>特約条項（任意）</Label>
          <textarea
            value={data.specialClause}
            onChange={(e) => set("specialClause", e.target.value)}
            placeholder="例：進学時には別途協議する。"
            rows={4}
            className="border border-stone-300 rounded px-3 py-2 bg-white text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 text-sm w-full resize-none"
          />
          <span className="text-xs text-stone-400">第2条として記載されます。空欄の場合は「特約なし」となります。</span>
        </div>
        <div className="space-y-3">
          <Label>離婚日から合意書作成日までに発生した法定養育費の取り扱い（第4条）</Label>
          <div className="space-y-3">
            {[
              { value: "A", label: "別途請求することができる", desc: "法定養育費を保持する" },
              { value: "B", label: "請求を放棄する", desc: "法定養育費を放棄する" },
            ].map((opt) => (
              <label key={opt.value} className={`flex items-center gap-3 cursor-pointer p-4 rounded-lg border-2 transition-all ${
                data.pastFeeHandling === opt.value ? "border-amber-600 bg-amber-50" : "border-stone-200 hover:border-stone-300"
              }`}>
                <input type="radio" value={opt.value} checked={data.pastFeeHandling === opt.value} onChange={() => set("pastFeeHandling", opt.value)} className="accent-amber-600" />
                <div>
                  <div className="font-medium text-stone-800 text-sm">{opt.label}</div>
                  <div className="text-xs text-stone-500">{opt.desc}</div>
                </div>
              </label>
            ))}
          </div>
        </div>
      </Card>
    </div>
  );
}

function StepDate({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">作成日</h2>
        <p className="text-sm text-stone-500">合意書の作成日を入力してください。</p>
      </div>
      <Card>
        <div className="flex gap-2 items-center flex-wrap">
          <Select value={data.createdYear} onChange={(v) => set("createdYear", v)} options={YEARS} placeholder="年" className="w-24" />
          <span className="text-stone-500">年</span>
          <Select value={data.createdMonth} onChange={(v) => set("createdMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
          <span className="text-stone-500">月</span>
          <Select value={data.createdDay} onChange={(v) => set("createdDay", v)} options={DAYS} placeholder="日" className="w-20" />
          <span className="text-stone-500">日</span>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// PDF GENERATOR (using window.print / HTML)
// ============================================================
function generatePDFContent(data) {
  const { payerRole, payeeRole, children, bankName, branchName, accountType, accountNumber, accountHolder, specialClause, pastFeeHandling, createdYear, createdMonth, createdDay } = data;

  function periodText(child) {
    if (child.periodType === "A") {
      return `${child.periodAFromYear}年${child.periodAFromMonth}月から${child.periodAToYear}年${child.periodAToMonth}月まで`;
    }
    return `${child.periodBFromYear}年${child.periodBFromMonth}月から、子が${child.periodBAge}歳に達した後の最初の3月まで`;
  }

  function paymentText(child) {
    if (child.paymentType === "A") {
      // 「末」を選択した場合、自動で「末日」となるように処理
      return `毎月${child.paymentADay}日（1か月分）`;
    }
    return `毎年${child.paymentBMonth}月に${child.paymentBMonths}か月分ずつ`;
  }

  const tableRows = children.map((c, i) => `
    <tr>
      <td class="td">子ども${i + 1}</td>
      <td class="td">${c.name || "（氏名未入力）"}<br><span style="font-size:10px;">生年月日：${c.birthYear || ""}年${c.birthMonth || ""}月${c.birthDay || ""}日</span></td>
      <td class="td">${periodText(c)}</td>
      <td class="td">月額 ${c.amount || "0"}円</td>
      <td class="td">${paymentText(c)}</td>
    </tr>
  `).join("");

  const pastFeeText = pastFeeHandling === "A"
    ? "別途請求することができるものとする。"
    : "請求を放棄するものとする。";

  const specialText = specialClause || "（特約事項なし）";

  return `
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>養育費合意書</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { margin: 20mm 20mm; size: A4; }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif; font-size: 11pt; line-height: 1.8; color: #1a1a1a; background: #fff; }
  .container { max-width: 170mm; margin: 0 auto; padding: 10mm 0; }
  h1 { text-align: center; font-size: 20pt; letter-spacing: 0.3em; margin-bottom: 16mm; border-bottom: 2px solid #1a1a1a; padding-bottom: 4mm; }
  .article { margin-bottom: 8mm; }
  .article-title { font-size: 12pt; font-weight: bold; margin-bottom: 3mm; }
  .article-body { text-indent: 1em; }
  table { width: 100%; border-collapse: collapse; margin: 4mm 0; font-size: 9.5pt; }
  .td, th { border: 1px solid #555; padding: 2mm 3mm; vertical-align: top; }
  th { background: #f0ebe0; font-weight: bold; text-align: center; }
  .note { font-size: 9pt; color: #555; margin-top: 2mm; }
  .sign-section { margin-top: 14mm; }
  .sign-row { display: flex; align-items: flex-end; gap: 8mm; margin-bottom: 8mm; }
  .sign-label { font-weight: bold; width: 30mm; text-align: right; padding-right: 4mm; }
  .sign-line { border-bottom: 1px solid #555; flex: 1; min-width: 60mm; height: 10mm; }
  .sign-hanko { width: 15mm; height: 15mm; border: 1px solid #555; text-align: center; line-height: 15mm; font-size: 9pt; }
  /* ★変更点3: 下部の免責事項（footer-note）を削除しました */
  @media print {
    button { display: none; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>養 育 費 合 意 書</h1>

  <div class="article">
    <div class="article-title">第１条（支払条項）</div>
    <div class="article-body">${payerRole}は、${payeeRole}に対して、次の表に定めるところにより、子の養育費を支払う。</div>
    <table>
      <thead>
        <tr>
          <th class="td">区分</th>
          <th class="td">子の氏名</th>
          <th class="td">支払期間</th>
          <th class="td">金額</th>
          <th class="td">支払時期</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>
    <div class="article-body">
      振込先：${bankName || "（金融機関名）"} ${branchName || "（支店名）"}　${accountType}預金　口座番号 ${accountNumber || "（口座番号）"}　口座名義 ${accountHolder || "（口座名義）"}<br>
      振込手数料は、支払う側が負担することとする。
    </div>
  </div>

  <div class="article">
    <div class="article-title">第２条（特約条項）</div>
    <div class="article-body">前条の規定のほか、本合意の特約として、次のとおり合意する。<br>
    ${specialText}</div>
  </div>

  <div class="article">
    <div class="article-title">第３条（協議条項）</div>
    <div class="article-body">父及び母は、第１条の表に掲げる子について、父、母又は子の病気、進学、転職、再婚、養子縁組その他の事情により、養育費の金額その他の支払条件を変更する必要が生じたときは、別途、誠実に協議する。</div>
  </div>

  <div class="article">
    <div class="article-title">第４条（清算条項）</div>
    <div class="article-body">父及び母は、第１条の表に掲げる子の養育費について、本合意書に定めるもののほか未払のものがないことを相互に確認する。</div>
    <div class="article-body">ただし、離婚の日から本合意書作成の日までに発生した法定養育費については、${pastFeeText}</div>
  </div>

  <div class="article-body" style="margin-top:10mm;">
    以上のとおり合意が成立したことを証するため、本合意書を２通作成し、各自署名・押印の上、各１通を保有する。
  </div>

  <div style="text-align:right; margin-top:4mm;">
    ${createdYear || "　　"}年　${createdMonth || "　"}月　${createdDay || "　　"}日
  </div>

  <div class="sign-section">
    <div class="sign-row">
      <div class="sign-label">父（${payerRole === "父" ? "支払う側" : "受取る側"}）</div>
      <div class="sign-line"></div>
      <div class="sign-hanko">印</div>
    </div>
    <div class="sign-row">
      <div class="sign-label">母（${payerRole === "母" ? "支払う側" : "受取る側"}）</div>
      <div class="sign-line"></div>
      <div class="sign-hanko">印</div>
    </div>
  </div>

</div>
</body>
</html>
  `;
}

// ============================================================
// PREVIEW COMPONENT
// ============================================================
function PreviewStep({ data }) {
  const iframeRef = useRef(null);
  const content = generatePDFContent(data);

  const handlePrint = () => {
    const w = window.open("", "_blank");
    w.document.write(content);
    w.document.close();
    w.onload = () => { w.print(); };
  };

  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-2xl font-bold text-stone-800 mb-1">プレビュー・PDF出力</h2>
        <p className="text-sm text-stone-500">内容を確認してからPDFを出力してください。すべての処理はブラウザ内で完結し、外部サーバーには送信されません。</p>
      </div>
      <div className="bg-green-50 border border-green-200 rounded-xl p-4 flex items-start gap-3">
        <svg className="w-5 h-5 text-green-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
        <div>
          <div className="font-semibold text-green-800 text-sm">プライバシー保護</div>
          <div className="text-green-700 text-xs mt-0.5">入力された情報は外部サーバーへ一切送信されません。すべての処理がブラウザ内で完結します。</div>
        </div>
      </div>
      <button
        onClick={handlePrint}
        className="w-full bg-amber-700 hover:bg-amber-800 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2"
      >
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
        PDF を出力する（印刷ダイアログから保存）
      </button>
      <div className="border border-stone-200 rounded-xl overflow-hidden shadow-inner" style={{ height: "600px" }}>
        <iframe
          srcDoc={content}
          className="w-full h-full"
          title="養育費合意書プレビュー"
          sandbox="allow-same-origin"
        />
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const STEPS = [
  { id: 0, label: "当事者情報", icon: "👤" },
  { id: 1, label: "子どもの情報", icon: "👶" },
  { id: 2, label: "振込先情報", icon: "🏦" },
  { id: 3, label: "特約・清算", icon: "📋" },
  { id: 4, label: "作成日", icon: "📅" },
  { id: 5, label: "出力", icon: "📄" },
];

function App() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState(initialState);

  const canNext = () => {
    if (step === 0) return data.payerRole !== data.payeeRole;
    return true;
  };

  const stepComponents = [
    <StepParties data={data} setData={setData} />,
    <StepChildren data={data} setData={setData} />,
    <StepBank data={data} setData={setData} />,
    <StepSpecial data={data} setData={setData} />,
    <StepDate data={data} setData={setData} />,
    <PreviewStep data={data} />,
  ];

  return (
    <div className="min-h-screen" style={{ background: "linear-gradient(135deg, #fdf8f0 0%, #f5efe0 50%, #ede8d8 100%)" }}>
      {/* Header */}
      <header className="sticky top-0 z-10 bg-stone-900 text-white shadow-lg">
        <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
          <div>
            <h1 className="font-bold text-lg tracking-wide">養育費合意書</h1>
            <p className="text-xs text-stone-400">自動生成システム</p>
          </div>
          <div className="text-xs text-stone-400 bg-stone-800 px-3 py-1 rounded-full border border-stone-700">
            🔒 完全クライアント処理
          </div>
        </div>
      </header>

      {/* Step indicator */}
      <div className="bg-white border-b border-stone-200 shadow-sm">
        <div className="max-w-2xl mx-auto px-4 py-3">
          <div className="flex items-center gap-1 overflow-x-auto pb-1">
            {STEPS.map((s, i) => (
              <div key={s.id} className="flex items-center flex-shrink-0">
                <button
                  onClick={() => i <= step && setStep(i)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${
                    i === step
                      ? "bg-amber-700 text-white"
                      : i < step
                      ? "bg-amber-100 text-amber-800 hover:bg-amber-200 cursor-pointer"
                      : "bg-stone-100 text-stone-400 cursor-default"
                  }`}
                >
                  <span>{s.icon}</span>
                  <span className="hidden sm:inline">{s.label}</span>
                  <span className="sm:hidden">{i + 1}</span>
                </button>
                {i < STEPS.length - 1 && (
                  <div className={`w-4 h-0.5 mx-1 ${i < step ? "bg-amber-400" : "bg-stone-200"}`} />
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main className="max-w-2xl mx-auto px-4 py-8">
        <div className="transition-all duration-300">
          {stepComponents[step]}
        </div>

        {/* Navigation */}
        <div className="flex justify-between mt-8 pt-6 border-t border-stone-200">
          <button
            onClick={() => setStep(Math.max(0, step - 1))}
            disabled={step === 0}
            className="px-6 py-3 rounded-xl border-2 border-stone-300 text-stone-600 font-semibold text-sm hover:border-stone-400 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
          >
            ← 前へ
          </button>
          {step < STEPS.length - 1 && (
            <button
              onClick={() => canNext() && setStep(step + 1)}
              disabled={!canNext()}
              className="px-8 py-3 rounded-xl bg-amber-700 text-white font-semibold text-sm hover:bg-amber-800 disabled:opacity-40 disabled:cursor-not-allowed transition-all shadow-md"
            >
              次へ →
            </button>
          )}
        </div>

      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
