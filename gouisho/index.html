<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;">
<title>養育費合意書 作成ツール｜養育費サポートJP</title>
<meta name="description" content="離婚時や養育費の取り決めを新しく行う際に交わす「合意書」をブラウザ上で簡単に無料作成できます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com" integrity="sha384-xyz...=" crossorigin="anonymous"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#4a403d',
          mid: '#857c7a',
          light: '#e8e0de',
          bg: '#fdfcf9',
          primary: {
            DEFAULT: '#f48c71',
            light: '#fff3f0',
            dark: '#e2765b'
          },
          secondary: {
            DEFAULT: '#6cb8a9',
            light: '#f0f9f7',
          },
          warning: {
            DEFAULT: '#eaaa58',
            light: '#fdf7f0',
          }
        },
        fontFamily: {
          sans: ['"M PLUS Rounded 1c"', '"Hiragino Maru Gothic ProN"', '"Noto Sans JP"', 'sans-serif'],
        },
        boxShadow: {
          'soft': '0 8px 24px rgba(74, 64, 61, 0.06), 0 2px 6px rgba(74, 64, 61, 0.04)',
          'soft-hover': '0 12px 32px rgba(74, 64, 61, 0.10), 0 4px 10px rgba(74, 64, 61, 0.05)',
        }
      }
    }
  }
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" integrity="sha384-jKziE0R7iZtF8H0uL7T8yI4E/TWeA40Drdh2O9cIe2Q4R9Z0xK/Ue/u3XbX6z/xM"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" integrity="sha384-yP//M9bY1fHtwH7U/jD5jE6YyR0/1oM6XjX+VqL9K+bZ8G0m6T0Z0m0m2m1+9y+0"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" integrity="sha384-xL38u5G/B3rA2a/t2Xm3+1Q0H3/PZ1V9+Y2X/Z/K/w6M2z8sZ/X5G3v3K0/G1v1E" crossorigin="anonymous"></script>
</head>
<body class="bg-bg text-ink font-sans antialiased">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ============================================================
// CONSTANTS
// ============================================================
const MONTHS = Array.from({ length: 12 }, (_, i) => i + 1);
const YEARS = Array.from({ length: 50 }, (_, i) => 2001 + i);
const DAYS = Array.from({ length: 31 }, (_, i) => i + 1);
const AGES = Array.from({ length: 22 }, (_, i) => i + 1);

// ============================================================
// INITIAL STATE
// ============================================================
const defaultChild = () => ({
  id: Date.now(),
  name: "",
  birthYear: "",
  birthMonth: "",
  birthDay: "",
  periodType: "A",
  periodAFromYear: "",
  periodAFromMonth: "",
  periodAToYear: "",
  periodAToMonth: "",
  periodBFromYear: "",
  periodBFromMonth: "",
  periodBAge: "",
  amount: "",
  paymentType: "A",
  paymentADay: "",
  paymentBMonth: "",
  paymentBMonths: "",
});

const initialState = {
  payerRole: "父",
  payeeRole: "母",
  children: [defaultChild()],
  bankName: "",
  branchName: "",
  accountType: "普通",
  accountNumber: "",
  accountHolder: "",
  specialClause: "",
  pastFeeHandling: "A",
  createdYear: "",
  createdMonth: "",
  createdDay: "",
};

// ============================================================
// HELPERS
// ============================================================
function formatAmount(v) {
  const n = v.replace(/[^0-9]/g, "");
  return n.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function Select({ value, onChange, options, placeholder, className = "" }) {
  return (
    <div className={`relative ${className}`}>
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full border-2 border-light rounded-xl px-4 py-3 bg-[#faf8f6] text-ink focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary-light transition-all text-sm appearance-none pr-10"
      >
        {placeholder && <option value="">{placeholder}</option>}
        {options.map((o) =>
          typeof o === "object" ? (
            <option key={o.value} value={o.value}>{o.label}</option>
          ) : (
            <option key={o} value={o}>{o}</option>
          )
        )}
      </select>
      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-mid">
        ▼
      </div>
    </div>
  );
}

function Input({ value, onChange, placeholder, className = "", type = "text" }) {
  return (
    <input
      type={type}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      className={`border-2 border-light rounded-xl px-4 py-3 bg-[#faf8f6] text-ink focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary-light transition-all text-sm w-full ${className}`}
    />
  );
}

function Label({ children }) {
  return <span className="block text-sm font-bold text-mid tracking-wide mb-2">{children}</span>;
}

function Row({ label, children, className = "" }) {
  return (
    <div className={`flex flex-col ${className}`}>
      {label && <Label>{label}</Label>}
      <div className="flex flex-wrap gap-2 items-center">{children}</div>
    </div>
  );
}

function Card({ children, className = "" }) {
  return (
    <div className={`bg-white border-2 border-light rounded-3xl p-6 sm:p-8 shadow-soft hover:border-[#d8cec9] transition-all ${className}`}>
      {children}
    </div>
  );
}

// ============================================================
// STEP COMPONENTS
// ============================================================

function StepParties({ data, setData }) {
  const roles = ["父", "母"];
  return (
    <div className="space-y-6">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-primary-light text-primary flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">当事者情報</h2>
        </div>
        <p className="text-sm text-mid pl-13">養育費を支払う側と受け取る側を選択してください。</p>
      </div>
      <Card>
        <div className="space-y-6">
          <Row label="養育費を支払う側">
            <div className="flex gap-3 w-full sm:w-auto">
              {roles.map((r) => (
                <button
                  key={r}
                  onClick={() => setData({ ...data, payerRole: r })}
                  className={`flex-1 sm:flex-none px-8 py-3.5 rounded-full border-2 text-base font-bold transition-all ${
                    data.payerRole === r
                      ? "border-primary bg-primary-light text-primary"
                      : "border-light bg-white text-mid hover:border-primary"
                  }`}
                >
                  {r}
                </button>
              ))}
            </div>
          </Row>
          <Row label="養育費を受け取る側">
            <div className="flex gap-3 w-full sm:w-auto">
              {roles.map((r) => (
                <button
                  key={r}
                  onClick={() => setData({ ...data, payeeRole: r })}
                  className={`flex-1 sm:flex-none px-8 py-3.5 rounded-full border-2 text-base font-bold transition-all ${
                    data.payeeRole === r
                      ? "border-primary bg-primary-light text-primary"
                      : "border-light bg-white text-mid hover:border-primary"
                  }`}
                >
                  {r}
                </button>
              ))}
            </div>
          </Row>
          {data.payerRole === data.payeeRole && (
            <p className="text-red-500 text-sm font-bold bg-red-50 p-3 rounded-xl">⚠️ 支払う側と受け取る側を異なる役割にしてください。</p>
          )}
        </div>
      </Card>
    </div>
  );
}

function ChildForm({ child, idx, onUpdate, onRemove, canRemove }) {
  const updateChild = (field, val) => onUpdate({ ...child, [field]: val });

  return (
    <Card className="relative">
      <div className="flex items-center justify-between mb-6 pb-4 border-b-2 border-dashed border-light">
        <h3 className="font-bold text-ink text-lg flex items-center gap-2">
          <span className="bg-warning-light text-warning w-8 h-8 rounded-full flex items-center justify-center text-sm">{idx + 1}</span>
          お子さま {idx + 1}
        </h3>
        {canRemove && (
          <button
            onClick={onRemove}
            className="text-mid hover:text-primary border-2 border-light hover:border-primary hover:bg-primary-light px-4 py-2 rounded-full transition-all text-xs font-bold"
          >
            削除
          </button>
        )}
      </div>
      <div className="space-y-6">
        <Row label="氏名">
          <Input value={child.name} onChange={(v) => updateChild("name", v)} placeholder="山田 花子" className="max-w-[240px]" />
        </Row>
        <div>
          <Label>生年月日</Label>
          <div className="flex gap-2 mt-1 items-center flex-wrap">
            <Select value={child.birthYear} onChange={(v) => updateChild("birthYear", v)} options={YEARS} placeholder="年" className="w-24" />
            <span className="text-mid text-sm font-bold">年</span>
            <Select value={child.birthMonth} onChange={(v) => updateChild("birthMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
            <span className="text-mid text-sm font-bold">月</span>
            <Select value={child.birthDay} onChange={(v) => updateChild("birthDay", v)} options={DAYS} placeholder="日" className="w-20" />
            <span className="text-mid text-sm font-bold">日</span>
          </div>
        </div>

        {/* 支払期間 */}
        <div className="space-y-3 pt-4 border-t border-light">
          <Label>支払期間の決め方</Label>
          <div className="space-y-3">
            <label className={`block p-4 rounded-2xl border-2 transition-all cursor-pointer ${child.periodType === "A" ? "border-primary bg-primary-light" : "border-light hover:border-[#d8cec9]"}`}>
              <div className="flex items-center gap-3">
                <input type="radio" name={`periodType-${child.id}`} value="A" checked={child.periodType === "A"} onChange={() => updateChild("periodType", "A")} className="w-5 h-5 accent-primary" />
                <span className="text-sm text-ink font-bold">特定の年月を直接入力する</span>
              </div>
              {child.periodType === "A" && (
                <div className="flex gap-2 items-center flex-wrap mt-4 ml-8">
                  <Select value={child.periodAFromYear} onChange={(v) => updateChild("periodAFromYear", v)} options={YEARS} placeholder="年" className="w-24 bg-white" />
                  <span className="text-mid text-sm font-bold">年</span>
                  <Select value={child.periodAFromMonth} onChange={(v) => updateChild("periodAFromMonth", v)} options={MONTHS} placeholder="月" className="w-20 bg-white" />
                  <span className="text-mid text-sm font-bold">月から</span>
                  <div className="w-full sm:w-auto h-2 sm:h-auto"></div>
                  <Select value={child.periodAToYear} onChange={(v) => updateChild("periodAToYear", v)} options={YEARS} placeholder="年" className="w-24 bg-white" />
                  <span className="text-mid text-sm font-bold">年</span>
                  <Select value={child.periodAToMonth} onChange={(v) => updateChild("periodAToMonth", v)} options={MONTHS} placeholder="月" className="w-20 bg-white" />
                  <span className="text-mid text-sm font-bold">月まで</span>
                </div>
              )}
            </label>
            <label className={`block p-4 rounded-2xl border-2 transition-all cursor-pointer ${child.periodType === "B" ? "border-primary bg-primary-light" : "border-light hover:border-[#d8cec9]"}`}>
              <div className="flex items-center gap-3">
                <input type="radio" name={`periodType-${child.id}`} value="B" checked={child.periodType === "B"} onChange={() => updateChild("periodType", "B")} className="w-5 h-5 accent-primary" />
                <span className="text-sm text-ink font-bold">子が一定年齢に達した後の3月まで</span>
              </div>
              {child.periodType === "B" && (
                <div className="flex gap-2 items-center flex-wrap mt-4 ml-8">
                  <Select value={child.periodBFromYear} onChange={(v) => updateChild("periodBFromYear", v)} options={YEARS} placeholder="年" className="w-24 bg-white" />
                  <span className="text-mid text-sm font-bold">年</span>
                  <Select value={child.periodBFromMonth} onChange={(v) => updateChild("periodBFromMonth", v)} options={MONTHS} placeholder="月" className="w-20 bg-white" />
                  <span className="text-mid text-sm font-bold">月から子が</span>
                  <div className="w-full sm:w-auto h-2 sm:h-auto"></div>
                  <Select value={child.periodBAge} onChange={(v) => updateChild("periodBAge", v)} options={AGES} placeholder="歳" className="w-20 bg-white" />
                  <span className="text-mid text-sm font-bold">歳に達した後の最初の3月まで</span>
                </div>
              )}
            </label>
          </div>
        </div>

        {/* 金額 */}
        <div className="pt-4 border-t border-light">
          <Row label="月額養育費">
            <div className="flex items-center gap-3">
              <span className="text-mid text-sm font-bold bg-light px-3 py-2 rounded-lg">月額</span>
              <div className="relative">
                <Input
                  value={child.amount}
                  onChange={(v) => updateChild("amount", formatAmount(v))}
                  placeholder="50,000"
                  className="max-w-[160px] text-lg font-bold"
                />
              </div>
              <span className="text-mid text-sm font-bold">円</span>
            </div>
          </Row>
        </div>

        {/* 支払時期 */}
        <div className="space-y-3 pt-4 border-t border-light">
          <Label>支払いのタイミング</Label>
          <div className="space-y-3">
            <label className={`block p-4 rounded-2xl border-2 transition-all cursor-pointer ${child.paymentType === "A" ? "border-primary bg-primary-light" : "border-light hover:border-[#d8cec9]"}`}>
              <div className="flex items-center gap-3">
                <input type="radio" name={`payType-${child.id}`} value="A" checked={child.paymentType === "A"} onChange={() => updateChild("paymentType", "A")} className="w-5 h-5 accent-primary" />
                <span className="text-sm text-ink font-bold">毎月払い</span>
              </div>
              {child.paymentType === "A" && (
                <div className="flex gap-2 items-center mt-4 ml-8">
                  <span className="text-mid text-sm font-bold">毎月</span>
                  <Select value={child.paymentADay} onChange={(v) => updateChild("paymentADay", v)} options={[...DAYS, "末"]} placeholder="日/末" className="w-24 bg-white" />
                  <span className="text-mid text-sm font-bold">日（1か月分ずつ）</span>
                </div>
              )}
            </label>
            <label className={`block p-4 rounded-2xl border-2 transition-all cursor-pointer ${child.paymentType === "B" ? "border-primary bg-primary-light" : "border-light hover:border-[#d8cec9]"}`}>
              <div className="flex items-center gap-3">
                <input type="radio" name={`payType-${child.id}`} value="B" checked={child.paymentType === "B"} onChange={() => updateChild("paymentType", "B")} className="w-5 h-5 accent-primary" />
                <span className="text-sm text-ink font-bold">まとめ払い（年払い等）</span>
              </div>
              {child.paymentType === "B" && (
                <div className="flex gap-2 items-center flex-wrap mt-4 ml-8">
                  <span className="text-mid text-sm font-bold">毎年</span>
                  <Select value={child.paymentBMonth} onChange={(v) => updateChild("paymentBMonth", v)} options={MONTHS} placeholder="月" className="w-20 bg-white" />
                  <span className="text-mid text-sm font-bold">月に</span>
                  <Select value={child.paymentBMonths} onChange={(v) => updateChild("paymentBMonths", v)} options={Array.from({ length: 12 }, (_, i) => i + 1)} placeholder="か月分" className="w-24 bg-white" />
                  <span className="text-mid text-sm font-bold">か月分ずつ</span>
                </div>
              )}
            </label>
          </div>
        </div>
      </div>
    </Card>
  );
}

function StepChildren({ data, setData }) {
  const addChild = () => {
    if (data.children.length >= 4) return;
    setData({ ...data, children: [...data.children, defaultChild()] });
  };
  const removeChild = (idx) => {
    const c = [...data.children];
    c.splice(idx, 1);
    setData({ ...data, children: c });
  };
  const updateChild = (idx, child) => {
    const c = [...data.children];
    c[idx] = child;
    setData({ ...data, children: c });
  };

  return (
    <div className="space-y-6">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-warning-light text-warning flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">子どもの情報と条件</h2>
        </div>
        <p className="text-sm text-mid pl-13">最大4人まで登録できます。</p>
      </div>
      
      <div className="space-y-8">
        {data.children.map((child, idx) => (
          <ChildForm
            key={child.id}
            child={child}
            idx={idx}
            onUpdate={(c) => updateChild(idx, c)}
            onRemove={() => removeChild(idx)}
            canRemove={data.children.length > 1}
          />
        ))}
      </div>
      
      {data.children.length < 4 && (
        <button
          onClick={addChild}
          className="w-full border-2 border-dashed border-[#d1c8c5] hover:border-secondary hover:text-secondary hover:bg-secondary-light text-mid font-bold py-5 rounded-3xl flex items-center justify-center gap-2 transition-all mt-4"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          子どもを追加する
        </button>
      )}
    </div>
  );
}

function StepBank({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-secondary-light text-secondary flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"></rect><path d="M7 8V6a5 5 0 1 1 10 0v2"></path></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">振込先情報</h2>
        </div>
        <p className="text-sm text-mid pl-13">養育費の振込先口座を入力してください。</p>
      </div>
      <Card className="space-y-6">
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div className="flex flex-col">
            <Label>金融機関名</Label>
            <Input value={data.bankName} onChange={(v) => set("bankName", v)} placeholder="○○銀行" />
          </div>
          <div className="flex flex-col">
            <Label>支店名</Label>
            <Input value={data.branchName} onChange={(v) => set("branchName", v)} placeholder="○○支店" />
          </div>
        </div>
        <Row label="口座の種類">
          <div className="flex gap-3 w-full sm:w-auto">
            {["普通", "当座"].map((t) => (
              <button
                key={t}
                onClick={() => set("accountType", t)}
                className={`flex-1 sm:flex-none px-8 py-3 rounded-full border-2 text-sm font-bold transition-all ${
                  data.accountType === t
                    ? "border-primary bg-primary-light text-primary"
                    : "border-light bg-white text-mid hover:border-primary"
                }`}
              >
                {t}
              </button>
            ))}
          </div>
        </Row>
        <div className="flex flex-col">
          <Label>口座番号</Label>
          <Input value={data.accountNumber} onChange={(v) => set("accountNumber", v.replace(/[^0-9]/g, ""))} placeholder="1234567" className="max-w-[200px]" />
        </div>
        <div className="flex flex-col">
          <Label>口座名義（カタカナ）</Label>
          <Input value={data.accountHolder} onChange={(v) => set("accountHolder", v)} placeholder="ヤマダ ハナコ" className="max-w-[300px]" />
        </div>
        
        <div className="bg-warning-light border-2 border-warning rounded-2xl p-5 text-sm text-[#8c6014] font-bold mt-4 flex items-start gap-3">
          <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <p>振込手数料は、「支払う側が負担する」としてPDFに自動記載されます。</p>
        </div>
      </Card>
    </div>
  );
}

function StepSpecial({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-primary-light text-primary flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">特約・清算条項</h2>
        </div>
        <p className="text-sm text-mid pl-13">特約事項と過去の養育費の扱いを設定してください。</p>
      </div>
      <Card className="space-y-8">
        <div className="flex flex-col gap-2">
          <Label>特約条項（任意）</Label>
          <textarea
            value={data.specialClause}
            onChange={(e) => set("specialClause", e.target.value)}
            placeholder="例：進学時には別途協議する。"
            rows={4}
            className="border-2 border-light rounded-xl px-4 py-3 bg-[#faf8f6] text-ink focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary-light transition-all text-sm w-full resize-none"
          />
          <span className="text-xs font-bold text-mid">第2条として記載されます。空欄の場合は「特約なし」となります。</span>
        </div>
        
        <div className="space-y-4 pt-6 border-t border-light">
          <Label>離婚日から合意書作成日までに発生した「法定養育費」の取り扱い</Label>
          <div className="space-y-3">
            {[
              { value: "A", label: "別途請求することができる", desc: "法定養育費の権利を保持する" },
              { value: "B", label: "請求を放棄する", desc: "過去の分はなかったこと（放棄）にする" },
            ].map((opt) => (
              <label key={opt.value} className={`flex items-start gap-4 cursor-pointer p-5 rounded-2xl border-2 transition-all ${
                data.pastFeeHandling === opt.value ? "border-primary bg-primary-light" : "border-light hover:border-[#d8cec9]"
              }`}>
                <input type="radio" value={opt.value} checked={data.pastFeeHandling === opt.value} onChange={() => set("pastFeeHandling", opt.value)} className="w-5 h-5 mt-0.5 accent-primary" />
                <div>
                  <div className="font-bold text-ink text-sm mb-1">{opt.label}</div>
                  <div className="text-xs font-bold text-mid">{opt.desc}</div>
                </div>
              </label>
            ))}
          </div>
        </div>
      </Card>
    </div>
  );
}

function StepDate({ data, setData }) {
  const set = (k, v) => setData({ ...data, [k]: v });
  return (
    <div className="space-y-6">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-secondary-light text-secondary flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">作成日</h2>
        </div>
        <p className="text-sm text-mid pl-13">合意書の作成日（サインする日）を入力してください。</p>
      </div>
      <Card>
        <div className="flex gap-2 items-center flex-wrap">
          <Select value={data.createdYear} onChange={(v) => set("createdYear", v)} options={YEARS} placeholder="年" className="w-28" />
          <span className="text-mid font-bold">年</span>
          <Select value={data.createdMonth} onChange={(v) => set("createdMonth", v)} options={MONTHS} placeholder="月" className="w-20" />
          <span className="text-mid font-bold">月</span>
          <Select value={data.createdDay} onChange={(v) => set("createdDay", v)} options={DAYS} placeholder="日" className="w-20" />
          <span className="text-mid font-bold">日</span>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// PDF GENERATOR (using window.print / HTML)
// ============================================================
function generatePDFContent(data) {
  const { payerRole, payeeRole, children, bankName, branchName, accountType, accountNumber, accountHolder, specialClause, pastFeeHandling, createdYear, createdMonth, createdDay } = data;

  function periodText(child) {
    if (child.periodType === "A") {
      return `${child.periodAFromYear}年${child.periodAFromMonth}月から${child.periodAToYear}年${child.periodAToMonth}月まで`;
    }
    return `${child.periodBFromYear}年${child.periodBFromMonth}月から、子が${child.periodBAge}歳に達した後の最初の3月まで`;
  }

  function paymentText(child) {
    if (child.paymentType === "A") {
      return `毎月${child.paymentADay}日（1か月分）`;
    }
    return `毎年${child.paymentBMonth}月に${child.paymentBMonths}か月分ずつ`;
  }

  const tableRows = children.map((c, i) => `
    <tr>
      <td class="td">子ども${i + 1}</td>
      <td class="td">${c.name || "（氏名未入力）"}<br><span style="font-size:10px;">生年月日：${c.birthYear || ""}年${c.birthMonth || ""}月${c.birthDay || ""}日</span></td>
      <td class="td">${periodText(c)}</td>
      <td class="td">月額 ${c.amount || "0"}円</td>
      <td class="td">${paymentText(c)}</td>
    </tr>
  `).join("");

  const pastFeeText = pastFeeHandling === "A"
    ? "別途請求することができるものとする。"
    : "請求を放棄するものとする。";

  const specialText = specialClause || "（特約事項なし）";

  // PDF用は公的な書類らしさを出すため明朝体を指定
  return `
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>養育費合意書</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { margin: 20mm 20mm; size: A4; }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif; font-size: 11pt; line-height: 1.8; color: #1a1a1a; background: #fff; }
  .container { max-width: 170mm; margin: 0 auto; padding: 10mm 0; }
  h1 { text-align: center; font-size: 20pt; letter-spacing: 0.3em; margin-bottom: 16mm; border-bottom: 2px solid #1a1a1a; padding-bottom: 4mm; }
  .article { margin-bottom: 8mm; }
  .article-title { font-size: 12pt; font-weight: bold; margin-bottom: 3mm; }
  .article-body { text-indent: 1em; }
  table { width: 100%; border-collapse: collapse; margin: 4mm 0; font-size: 9.5pt; }
  .td, th { border: 1px solid #555; padding: 2mm 3mm; vertical-align: top; }
  th { background: #f0ebe0; font-weight: bold; text-align: center; }
  .note { font-size: 9pt; color: #555; margin-top: 2mm; }
  .sign-section { margin-top: 14mm; }
  .sign-row { display: flex; align-items: flex-end; gap: 8mm; margin-bottom: 8mm; }
  .sign-label { font-weight: bold; width: 30mm; text-align: right; padding-right: 4mm; }
  .sign-line { border-bottom: 1px solid #555; flex: 1; min-width: 60mm; height: 10mm; }
  .sign-hanko { width: 15mm; height: 15mm; border: 1px solid #555; text-align: center; line-height: 15mm; font-size: 9pt; }
  @media print {
    button { display: none; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>養 育 費 合 意 書</h1>

  <div class="article">
    <div class="article-title">第１条（支払条項）</div>
    <div class="article-body">${payerRole}は、${payeeRole}に対して、次の表に定めるところにより、子の養育費を支払う。</div>
    <table>
      <thead>
        <tr>
          <th class="td">区分</th>
          <th class="td">子の氏名</th>
          <th class="td">支払期間</th>
          <th class="td">金額</th>
          <th class="td">支払時期</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>
    <div class="article-body">
      振込先：${bankName || "（金融機関名）"} ${branchName || "（支店名）"}　${accountType}預金　口座番号 ${accountNumber || "（口座番号）"}　口座名義 ${accountHolder || "（口座名義）"}<br>
      振込手数料は、支払う側が負担することとする。
    </div>
  </div>

  <div class="article">
    <div class="article-title">第２条（特約条項）</div>
    <div class="article-body">前条の規定のほか、本合意の特約として、次のとおり合意する。<br>
    ${specialText}</div>
  </div>

  <div class="article">
    <div class="article-title">第３条（協議条項）</div>
    <div class="article-body">父及び母は、第１条の表に掲げる子について、父、母又は子の病気、進学、転職、再婚、養子縁組その他の事情により、養育費の金額その他の支払条件を変更する必要が生じたときは、別途、誠実に協議する。</div>
  </div>

  <div class="article">
    <div class="article-title">第４条（清算条項）</div>
    <div class="article-body">父及び母は、第１条の表に掲げる子の養育費について、本合意書に定めるもののほか未払のものがないことを相互に確認する。</div>
    <div class="article-body">ただし、離婚の日から本合意書作成の日までに発生した法定養育費については、${pastFeeText}</div>
  </div>

  <div class="article-body" style="margin-top:10mm;">
    以上のとおり合意が成立したことを証するため、本合意書を２通作成し、各自署名・押印の上、各１通を保有する。
  </div>

  <div style="text-align:right; margin-top:4mm;">
    ${createdYear || "　　"}年　${createdMonth || "　"}月　${createdDay || "　　"}日
  </div>

  <div class="sign-section">
    <div class="sign-row">
      <div class="sign-label">父（${payerRole === "父" ? "支払う側" : "受取る側"}）</div>
      <div class="sign-line"></div>
      <div class="sign-hanko">印</div>
    </div>
    <div class="sign-row">
      <div class="sign-label">母（${payerRole === "母" ? "支払う側" : "受取る側"}）</div>
      <div class="sign-line"></div>
      <div class="sign-hanko">印</div>
    </div>
  </div>

</div>
</body>
</html>
  `;
}

// ============================================================
// PREVIEW COMPONENT
// ============================================================
function PreviewStep({ data }) {
  const content = generatePDFContent(data);

  const handlePrint = () => {
    const w = window.open("", "_blank");
    w.document.write(content);
    w.document.close();
    w.onload = () => { w.print(); };
  };

  return (
    <div className="space-y-6">
      <div className="mb-6">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-xl bg-secondary-light text-secondary flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </div>
          <h2 className="text-xl font-bold text-ink">プレビュー・PDF出力</h2>
        </div>
        <p className="text-sm text-mid pl-13">内容を確認してからPDFを出力してください。</p>
      </div>

      <div className="bg-secondary-light border-2 border-secondary rounded-2xl p-5 flex items-start gap-4">
        <svg className="w-6 h-6 text-secondary mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <div>
          <div className="font-bold text-secondary text-sm mb-1">プライバシー保護</div>
          <div className="text-secondary text-xs font-bold leading-relaxed opacity-90">入力された情報は外部サーバーへ一切送信されません。<br/>すべての処理がこの画面（ブラウザ内）だけで完結するため安心です。</div>
        </div>
      </div>

      <button
        onClick={handlePrint}
        className="w-full bg-primary hover:bg-primary-dark text-white py-5 rounded-full font-bold text-lg transition-all shadow-[0_4px_12px_rgba(244,140,113,0.3)] hover:shadow-[0_6px_16px_rgba(244,140,113,0.4)] hover:-translate-y-1 flex items-center justify-center gap-3"
      >
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        PDF を出力する（印刷画面が開きます）
      </button>

      <div className="border-4 border-light rounded-3xl overflow-hidden shadow-inner bg-white mt-8" style={{ height: "600px" }}>
        <iframe
          srcDoc={content}
          className="w-full h-full"
          title="養育費合意書プレビュー"
          sandbox="allow-same-origin"
        />
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const STEPS = [
  { id: 0, label: "当事者情報", icon: "👤" },
  { id: 1, label: "子どもの情報", icon: "👶" },
  { id: 2, label: "振込先情報", icon: "🏦" },
  { id: 3, label: "特約・清算", icon: "📋" },
  { id: 4, label: "作成日", icon: "📅" },
  { id: 5, label: "出力", icon: "📄" },
];

function App() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState(initialState);

  const canNext = () => {
    if (step === 0) return data.payerRole !== data.payeeRole;
    return true;
  };

  const stepComponents = [
    <StepParties data={data} setData={setData} />,
    <StepChildren data={data} setData={setData} />,
    <StepBank data={data} setData={setData} />,
    <StepSpecial data={data} setData={setData} />,
    <StepDate data={data} setData={setData} />,
    <PreviewStep data={data} />,
  ];

  return (
    <div className="min-h-screen pb-20">
      {/* Header (Hero) */}
      <header className="bg-primary-light pt-8 pb-8 px-4 text-center relative border-b-4 border-primary overflow-hidden">
        <a href="../index.html" className="absolute top-4 left-4 sm:top-6 sm:left-6 text-primary text-sm font-bold flex items-center gap-1.5 bg-white px-5 py-2.5 rounded-full shadow-sm hover:-translate-x-1 transition-transform z-10">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
          トップへ戻る
        </a>
        <div className="absolute top-[-50px] right-[-50px] w-[200px] h-[200px] bg-white rounded-full opacity-40"></div>
        
        <svg className="w-[80px] h-[80px] mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="#f48c71" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M16 13H8"></path><path d="M16 17H8"></path><path d="M10 9H8"></path></svg>
        
        <h1 className="text-2xl sm:text-3xl font-bold text-primary mb-3 tracking-wider">養育費合意書 作成ツール</h1>
        <p className="text-sm font-bold text-ink leading-relaxed opacity-80">フォームに沿って入力するだけで、<br/>法的効力のある合意書（PDF）を自動作成します。</p>
      </header>

      {/* Step indicator */}
      <div className="bg-white border-b-2 border-light shadow-sm sticky top-0 z-20">
        <div className="max-w-5xl mx-auto px-4 py-3 sm:py-4">
          <div className="flex items-center lg:justify-center gap-1 sm:gap-2 overflow-x-auto pb-2 custom-scrollbar">
            {STEPS.map((s, i) => (
              <div key={s.id} className="flex items-center flex-shrink-0">
                <button
                  onClick={() => i <= step && setStep(i)}
                  className={`flex items-center gap-1.5 sm:gap-2 px-3 lg:px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${
                    i === step
                      ? "bg-primary text-white shadow-md"
                      : i < step
                      ? "bg-primary-light text-primary hover:bg-[#ffe5df] cursor-pointer"
                      : "bg-light text-mid cursor-default"
                  }`}
                >
                  <span className="text-base">{s.icon}</span>
                  <span className="hidden sm:inline whitespace-nowrap">{s.label}</span>
                  <span className="sm:hidden">{i + 1}</span>
                </button>
                {i < STEPS.length - 1 && (
                  <div className={`w-3 sm:w-4 lg:w-6 h-1 mx-1 sm:mx-1.5 lg:mx-2 rounded-full ${i < step ? "bg-primary-light" : "bg-light"}`} />
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main className="max-w-3xl mx-auto px-4 sm:px-6 py-10">
        <div className="transition-all duration-300">
          {stepComponents[step]}
        </div>

        {/* Navigation */}
        <div className="flex justify-between items-center mt-12 pt-8 border-t-2 border-light">
          <button
            onClick={() => setStep(Math.max(0, step - 1))}
            disabled={step === 0}
            className="px-6 sm:px-8 py-4 rounded-full border-2 border-light bg-white text-mid font-bold text-sm hover:border-mid hover:text-ink disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center gap-2"
          >
            ← 前に戻る
          </button>
          
          {step < STEPS.length - 1 ? (
            <button
              onClick={() => canNext() && setStep(step + 1)}
              disabled={!canNext()}
              className="px-8 sm:px-12 py-4 rounded-full bg-primary text-white font-bold text-base hover:bg-primary-dark hover:-translate-y-1 disabled:opacity-40 disabled:hover:translate-y-0 disabled:cursor-not-allowed transition-all shadow-[0_4px_12px_rgba(244,140,113,0.3)] hover:shadow-[0_6px_16px_rgba(244,140,113,0.4)] flex items-center gap-2"
            >
              次へ進む →
            </button>
          ) : (
             <div className="text-sm font-bold text-secondary flex items-center gap-2 bg-secondary-light px-6 py-3 rounded-full">
               <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
               すべての入力が完了しました
             </div>
          )}
        </div>
      </main>
      
      <style dangerouslySetInnerHTML={{__html: `
        .custom-scrollbar { overflow-x: auto; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e8e0de; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1c8c5; }
        @media (max-width: 768px) {
          .custom-scrollbar::-webkit-scrollbar { display: none; }
          .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
      `}} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
