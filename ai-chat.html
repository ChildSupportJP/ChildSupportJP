<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI アシスタント（β版）｜養育費サポートJP</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #4a403d;
    --mid: #857c7a;
    --light: #e8e0de;
    --bg: #fdfcf9;
    --white: #ffffff;
    --primary: #f48c71;
    --primary-light: #fff3f0;
    --secondary: #6cb8a9;
    --secondary-light: #f0f9f7;
    --r: 24px;
    --shadow: 0 8px 24px rgba(74, 64, 61, 0.06);
  }
  body {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', 'Noto Sans JP', sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .header {
    background: var(--white);
    padding: 16px 20px;
    border-bottom: 2px solid var(--light);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--secondary-light);
    color: var(--secondary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .header-title { font-weight: 700; font-size: 18px; }
  .header-subtitle { font-size: 12px; color: var(--mid); }
  
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }
  
  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .message.user { align-self: flex-end; }
  .message.ai { align-self: flex-start; }
  
  .bubble {
    padding: 14px 18px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.6;
    word-break: break-word;
  }
  .message.user .bubble {
    background: var(--primary);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .message.ai .bubble {
    background: var(--white);
    color: var(--ink);
    border: 2px solid var(--light);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    white-space: pre-wrap;
  }
  
  .disclaimer-box {
    background: var(--primary-light);
    border: 2px solid #fbd2c7;
    border-radius: 16px;
    padding: 16px;
    font-size: 13px;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .input-area {
    background: var(--white);
    padding: 16px 20px;
    border-top: 2px solid var(--light);
  }
  .input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }
  input[type="text"] {
    flex: 1;
    padding: 16px;
    border: 2px solid var(--light);
    border-radius: 50px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--secondary);
  }
  button {
    background: var(--secondary);
    color: var(--white);
    border: none;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  button:hover { background: #559f91; }
  button:disabled { background: var(--light); cursor: not-allowed; }
  
  .loading {
    display: flex; gap: 6px; padding: 10px 14px;
  }
  .dot {
    width: 8px; height: 8px; background: var(--mid); border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
  </div>
  <div>
    <div class="header-title">養育費 AIアシスタント</div>
    <div class="header-subtitle">養育費に関する一般的な疑問にお答えします</div>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="disclaimer-box">
    <strong>⚠️ ご利用にあたっての注意（必ずお読みください）</strong><br>
    ・AIによる自動回答のため、内容の正確性を完全に保証するものではありません。<br>
    ・個別の事案に対する法的なアドバイス（法律相談）を行うものではありません。最終的な判断は専門家にご相談ください。<br>
    ・個人情報（お名前、住所、連絡先など）は絶対に入力しないでください。
  </div>
  
  <div class="message ai">
    <div class="bubble">こんにちは！養育費サポートJPのAIアシスタントです。<br>養育費や手続きについて、分からないことがあれば入力してください。</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <input type="text" id="userInput" placeholder="質問を入力してください（例：合意書は必ず必要ですか？）" autocomplete="off">
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
const WORKER_URL = "https'//childsupport-ai.childsupportjp.workers.dev";

const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// Enterキーで送信
userInput.addEventListener('keypress', function (e) {
  if (e.key === 'Enter') sendMessage();
});

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  // ユーザーのメッセージを画面に追加
  appendMessage(text, 'user');
  userInput.value = '';
  sendBtn.disabled = true;

  // ローディングアニメーションを表示
  const loadingId = showLoading();

  try {
    // Cloudflare Workerに通信
    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    
    // ローディングを消してAIの回答を表示
    removeLoading(loadingId);
    if(data.reply) {
      appendMessage(data.reply, 'ai');
    } else {
      appendMessage("すみません、エラーが発生しました。", 'ai');
    }
  } catch (error) {
    removeLoading(loadingId);
    appendMessage("通信エラーが発生しました。時間を置いて再度お試しください。", 'ai');
  }

  sendBtn.disabled = false;
  userInput.focus();
}

function appendMessage(text, sender) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${sender}`;
  
  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'bubble';
  bubbleDiv.textContent = text;
  
  msgDiv.appendChild(bubbleDiv);
  chatContainer.appendChild(msgDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function showLoading() {
  const id = 'loading-' + Date.now();
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ai';
  msgDiv.id = id;
  
  msgDiv.innerHTML = `
    <div class="bubble" style="padding: 10px 16px;">
      <div class="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;
  
  chatContainer.appendChild(msgDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return id;
}

function removeLoading(id) {
  const loadingEl = document.getElementById(id);
  if (loadingEl) loadingEl.remove();
}
</script>

</body>
</html>
